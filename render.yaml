services:
  - type: web
    name: railopt-ai-express-market
    runtime: python
    buildCommand: >
      cd frontend && npm install && npm run build && cd ../backend &&
      python3 -m venv venv && ./venv/bin/pip install -r requirements.txt
    startCommand: cd backend && ./venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
